<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Weather App</title>

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <!-- CSS -->
        <link rel="stylesheet" href="assets/css/styles.css" />
    </head>

    <body>
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container">
                    <a class="navbar-brand" href="index.html">
                        Weather Frontend
                    </a>

                    <button
                        class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#menu"
                    >
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="menu">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item">
                                <a class="nav-link active" href="index.html">
                                    Home
                                </a>
                            </li>

                            <li class="nav-item">
                                <a class="nav-link" href="detail.html">
                                    Detalle
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main class="container-fluid">
            <div class="row">
                <!-- Sidebar -->
                <aside class="col-lg-2 sidebar d-none d-lg-block">
                    <div class="p-4">
                        <h4 class="fw-bold mb-4">Weather Chile</h4>

                        <ul class="list-group">
                            <li class="list-group-item">🌤️ Clima actual</li>

                            <li class="list-group-item">
                                🌧️ Pronóstico semanal
                            </li>

                            <li class="list-group-item">🌎 10 ciudades</li>

                            <li class="list-group-item">📱 Responsive</li>
                        </ul>
                    </div>
                </aside>

                <!-- Content -->
                <section class="col-12 col-lg-10 py-5 px-4">
                    <div class="hero-section mb-5">
                        <div class="hero-overlay">
                            <h1 class="display-3 fw-bold">Weather Chile</h1>

                            <p class="lead">
                                Consulta el clima actual y el pronóstico semanal
                                de distintas ciudades de Chile.
                            </p>
                        </div>
                    </div>

                    <div class="row g-4" id="citiesContainer"></div>
                </section>
            </div>
        </main>

        <footer class="bg-dark text-white text-center py-3">
            Proyecto Frontend Clima - Módulo 2
        </footer>

        <!-- jQuery -->
        <script
            src="https://code.jquery.com/jquery-4.0.0.min.js"
            integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
            crossorigin="anonymous"
        ></script>

        <!-- Bootstrap -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <!-- JS -->
        <script src="assets/js/data.js"></script>
        <script src="assets/js/app.js"></script>
    </body>
</html>
